<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Healthy Food Lion Game PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
text-align:center;
background:#000;
color:white;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#cursor{
position:absolute;
width:50px;
height:50px;
background:#00ff88;
border-radius:50%;
border:5px solid white;
transform:translate(-25px,-25px);
pointer-events:none;
z-index:999;
}

#topUI{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
font-size:30px;
}

#lion{
position:absolute;
top:90px;
width:100%;
font-size:80px;
}

#food{
position:absolute;
top:170px;
width:100%;
font-size:110px;
}

.buttons{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-around;
}

button{
width:320px;
height:140px;
font-size:32px;
border:none;
border-radius:30px;
color:white;
font-weight:bold;
}

.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

#leaderboard{
position:absolute;
right:20px;
top:120px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:15px;
font-size:18px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="cursor"></div>

<div id="topUI">
<div>⭐ Score <span id="score">0</span></div>
<div>⏱ <span id="time">60</span></div>
</div>

<div id="lion">🦁</div>
<div id="food">🍎</div>

<div class="buttons">

<button id="btnGreen" class="green">🟢 กินบ่อย</button>
<button id="btnYellow" class="yellow">🟡 กินพอดี</button>
<button id="btnRed" class="red">🔴 กินแต่น้อย</button>

</div>

<div id="leaderboard">
🏆 Leaderboard
<div id="board"></div>
</div>

<audio id="correct">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<audio id="wrong">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>

const foods=[

{emoji:"🥦",type:"green"},
{emoji:"🍎",type:"green"},
{emoji:"🥕",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍜",type:"yellow"},
{emoji:"🥪",type:"yellow"},

{emoji:"🍟",type:"red"},
{emoji:"🍔",type:"red"},
{emoji:"🍩",type:"red"}

];

let current;
let score=0;
let time=60;

const foodEl=document.getElementById("food");
const scoreEl=document.getElementById("score");
const timeEl=document.getElementById("time");
const lion=document.getElementById("lion");

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)];
foodEl.innerText=current.emoji;

}

function answer(type){

if(type===current.type){

score++;
scoreEl.innerText=score;

lion.innerText="🦁😋";

document.getElementById("correct").play();

setTimeout(()=>{
lion.innerText="🦁";
},500);

}else{

document.getElementById("wrong").play();

}

newFood();

}

newFood();

setInterval(()=>{

time--;
timeEl.innerText=time;

if(time<=0){

saveScore();
alert("หมดเวลา คะแนน "+score);
location.reload();

}

},1000);

function saveScore(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]");
scores.push(score);
scores.sort((a,b)=>b-a);
scores=scores.slice(0,5);

localStorage.setItem("scores",JSON.stringify(scores));

showBoard();

}

function showBoard(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]");

let html="";

scores.forEach(s=>{
html+="<div>"+s+"</div>";
});

document.getElementById("board").innerHTML=html;

}

showBoard();

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
});

const hands=new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}
});

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

let cooldown=false;

hands.onResults(results=>{

if(!results.multiHandLandmarks)return;

const hand=results.multiHandLandmarks[0];
const palm=hand[9];

let x=(1-palm.x)*window.innerWidth;
let y=palm.y*window.innerHeight;

const cursor=document.getElementById("cursor");
cursor.style.left=x+"px";
cursor.style.top=y+"px";

if(cooldown)return;

checkButton(x,y);

});

function checkButton(x,y){

const g=document.getElementById("btnGreen").getBoundingClientRect();
const yb=document.getElementById("btnYellow").getBoundingClientRect();
const r=document.getElementById("btnRed").getBoundingClientRect();

if(x>g.left && x<g.right && y>g.top && y<g.bottom){
cooldown=true;
answer("green");
setTimeout(()=>cooldown=false,700);
}

if(x>yb.left && x<yb.right && y>yb.top && y<yb.bottom){
cooldown=true;
answer("yellow");
setTimeout(()=>cooldown=false,700);
}

if(x>r.left && x<r.right && y>r.top && y<r.bottom){
cooldown=true;
answer("red");
setTimeout(()=>cooldown=false,700);
}

}

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();

</script>

</body>
</html>
