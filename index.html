<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Healthy Food Game</title>

<style>

body{
font-family: Arial;
background:#1e293b;
color:white;
text-align:center;
margin:0;
}

header{
background:#0f172a;
padding:15px;
font-size:28px;
font-weight:bold;
}

#game{
margin-top:30px;
}

#lion{
font-size:70px;
transition:0.3s;
}

#food{
font-size:120px;
margin:20px;
}

#choices{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

.choice{
padding:20px 40px;
font-size:24px;
border-radius:12px;
cursor:pointer;
border:none;
}

.green{background:#22c55e}
.yellow{background:#eab308}
.red{background:#ef4444}

#scoreboard{
margin-top:20px;
font-size:20px;
}

#timer{
font-size:24px;
margin-top:10px;
}

#leaderboard{
margin-top:20px;
}

</style>
</head>

<body>

<header>🦁 Healthy Food Game</header>

<div id="game">

<div id="lion">🦁</div>

<div id="food">🍎</div>

<div id="choices"></div>

<div id="timer">⏱ Time: 30</div>

<div id="scoreboard">⭐ Score: 0</div>

<div id="leaderboard">
🏆 Best Score: <span id="best">0</span>
</div>

</div>

<audio id="correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

<script>

const foods=[
{emoji:"🍎",type:"green"},
{emoji:"🥦",type:"green"},
{emoji:"🍌",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍞",type:"yellow"},
{emoji:"🥚",type:"yellow"},

{emoji:"🍔",type:"red"},
{emoji:"🍟",type:"red"},
{emoji:"🍩",type:"red"}
]

let score=0
let time=30
let currentFood

const foodEl=document.getElementById("food")
const choicesEl=document.getElementById("choices")
const scoreEl=document.getElementById("scoreboard")
const timerEl=document.getElementById("timer")
const lion=document.getElementById("lion")
const bestEl=document.getElementById("best")

let best=localStorage.getItem("best")||0
bestEl.textContent=best

function newRound(){

currentFood=foods[Math.floor(Math.random()*foods.length)]
foodEl.textContent=currentFood.emoji

choicesEl.innerHTML=""

let types=["green","yellow","red"]
types.sort(()=>0.5-Math.random())
types=types.slice(0,2)

types.forEach(type=>{

let btn=document.createElement("button")

btn.className="choice "+type

if(type=="green")btn.textContent="🟢 กินได้บ่อย"
if(type=="yellow")btn.textContent="🟡 กินพอดี"
if(type=="red")btn.textContent="🔴 กินแต่น้อย"

btn.onclick=()=>check(type)

choicesEl.appendChild(btn)

})

}

function check(choice){

if(choice==currentFood.type){

score++
scoreEl.textContent="⭐ Score: "+score

document.getElementById("correct").play()

lion.style.transform="scale(1.3)"

setTimeout(()=>{
lion.style.transform="scale(1)"
},200)

}else{

document.getElementById("wrong").play()

lion.textContent="🦁😵"

setTimeout(()=>{
lion.textContent="🦁"
},400)

}

newRound()

}

function startTimer(){

setInterval(()=>{

time--
timerEl.textContent="⏱ Time: "+time

if(time<=0){

alert("Game Over! Score: "+score)

if(score>best){
localStorage.setItem("best",score)
}

location.reload()

}

},1000)

}

newRound()
startTimer()

</script>

</body>
</html>
