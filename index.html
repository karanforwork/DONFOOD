<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>เกมอาหาร 3 สี</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
text-align:center;
color:white;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

.food{
position:absolute;
top:20%;
width:100%;
font-size:80px;
font-weight:bold;
}

.score{
position:absolute;
top:20px;
right:30px;
font-size:30px;
}

.timer{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:40px;
background:black;
padding:10px 20px;
border-radius:20px;
}

.choice{
position:absolute;
width:280px;
height:280px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:120px;
color:white;
}

.left{
left:5%;
top:50%;
transform:translateY(-50%);
}

.right{
right:5%;
top:50%;
transform:translateY(-50%);
}

.green{background:#27ae60}
.yellow{background:#f1c40f;color:black}
.red{background:#e74c3c}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="timer" id="timer">60</div>

<div class="score">คะแนน: <span id="score">0</span></div>

<div class="food" id="food">แอปเปิล</div>

<div id="left" class="choice"></div>
<div id="right" class="choice"></div>

<script>

const foods=[

{name:"แอปเปิล 🍎",color:"green"},
{name:"กล้วย 🍌",color:"green"},
{name:"แตงโม 🍉",color:"green"},
{name:"บรอกโคลี 🥦",color:"green"},
{name:"แครอท 🥕",color:"green"},
{name:"แตงกวา 🥒",color:"green"},

{name:"ข้าว 🍚",color:"yellow"},
{name:"ไข่ 🍳",color:"yellow"},
{name:"นม 🥛",color:"yellow"},
{name:"ข้าวโพด 🌽",color:"yellow"},
{name:"มันฝรั่ง 🥔",color:"yellow"},
{name:"ขนมปัง 🍞",color:"yellow"},

{name:"โดนัท 🍩",color:"red"},
{name:"เค้ก 🍰",color:"red"},
{name:"ลูกอม 🍬",color:"red"},
{name:"น้ำอัดลม 🥤",color:"red"},
{name:"เฟรนช์ฟราย 🍟",color:"red"},
{name:"เบอร์เกอร์ 🍔",color:"red"}

]

let current
let score=0

function randomColor(){

const colors=["green","yellow","red"]
return colors[Math.floor(Math.random()*3)]

}

function next(){

current=foods[Math.floor(Math.random()*foods.length)]

document.getElementById("food").innerText=current.name

let correct=current.color
let wrong=randomColor()

while(wrong===correct){
wrong=randomColor()
}

if(Math.random()>0.5){

setChoice(left,correct,true)
setChoice(right,wrong,false)

}else{

setChoice(left,wrong,false)
setChoice(right,correct,true)

}

}

function setChoice(btn,color,isCorrect){

btn.className="choice "+btn.classList.contains("left")?"left":"right"
btn.classList.add(color)

btn.dataset.correct=isCorrect

}

left.onclick=()=>choose(left)
right.onclick=()=>choose(right)

function choose(btn){

if(btn.dataset.correct==="true"){

score++
document.getElementById("score").innerText=score

}

next()

}

next()

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

let time=60

setInterval(()=>{

time--
timer.innerText=time

if(time<=0){

alert("จบเกม! คะแนน "+score)
location.reload()

}

},1000)

</script>

</body>
</html>
