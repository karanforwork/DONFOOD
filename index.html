<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Lion Dance Food Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:
url("https://images.unsplash.com/photo-1513151233558-d860c5398176")
center/cover no-repeat;
color:white;
overflow:hidden;
}

.overlay{
background:rgba(120,0,0,0.7);
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

h1{
font-size:48px;
margin-top:10px;
}

#lion{
font-size:90px;
}

#video{
position:absolute;
top:0;
left:0;
opacity:0.15;
transform:scaleX(-1);
}

#cursor{
position:absolute;
width:40px;
height:40px;
background:gold;
border-radius:50%;
border:4px solid white;
pointer-events:none;
}

.game{
position:absolute;
bottom:80px;
width:100%;
}

button{
font-size:34px;
padding:25px;
margin:15px;
border:none;
border-radius:14px;
width:220px;
}

.green{background:#2ecc71;color:white}
.yellow{background:#f1c40f}
.red{background:#e74c3c;color:white}

#food{
font-size:42px;
margin:20px;
}

#score,#timer{
font-size:28px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<h1>🦁 Lion Dance Food Game</h1>
<div id="lion">🦁</div>

<div id="timer">เวลา: 60</div>
<div id="score">คะแนน: 0</div>

<video id="video" width="640" height="480" autoplay></video>
<div id="cursor"></div>

<div class="game">

<div id="food"></div>

<button class="green" id="g">🟢 เขียว</button>
<button class="yellow" id="y">🟡 เหลือง</button>
<button class="red" id="r">🔴 แดง</button>

</div>

<audio id="drum" src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>

<script>

const foods=[
{name:"🥦 บรอกโคลี",type:"green"},
{name:"🥒 แตงกวา",type:"green"},
{name:"🥬 ผักกาด",type:"green"},
{name:"🍚 ข้าว",type:"yellow"},
{name:"🍌 กล้วย",type:"yellow"},
{name:"🍞 ขนมปัง",type:"yellow"},
{name:"🍰 เค้ก",type:"red"},
{name:"🍬 ลูกอม",type:"red"},
{name:"🥤 น้ำอัดลม",type:"red"}
]

let score=0
let time=60
let current

function newFood(){
current=foods[Math.floor(Math.random()*foods.length)]
food.innerText=current.name
}

function answer(type){

if(type==current.type){

score++
scoreText()

lion.innerText="🦁😋"
drum.play()

setTimeout(()=>lion.innerText="🦁",600)

}else{

lion.innerText="🦁😵"

setTimeout(()=>lion.innerText="🦁",600)

}

newFood()
}

function scoreText(){
scoreDiv.innerText="คะแนน: "+score
}

g.onclick=()=>answer("green")
y.onclick=()=>answer("yellow")
r.onclick=()=>answer("red")

const scoreDiv=document.getElementById("score")

newFood()

setInterval(()=>{

time--

timer.innerText="เวลา: "+time

if(time<=0){
alert("หมดเวลา คะแนน "+score)
location.reload()
}

},1000)

let cx=300
let cy=300

function smooth(x,y){
cx=cx+(x-cx)*0.3
cy=cy+(y-cy)*0.3
cursor.style.left=cx+"px"
cursor.style.top=cy+"px"
}

function checkHover(){

let buttons=[g,y,r]

buttons.forEach(b=>{

let rect=b.getBoundingClientRect()

if(
cx>rect.left &&
cx<rect.right &&
cy>rect.top &&
cy<rect.bottom
){
b.click()
}

})

}

const hands=new Hands({
locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks.length>0){

let p=results.multiHandLandmarks[0][8]

let x=(1-p.x)*window.innerWidth
let y=p.y*window.innerHeight

smooth(x,y)

checkHover()

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

camera.start()

document.body.onclick=()=>{
document.documentElement.requestFullscreen()
}

</script>

</body>
</html>
