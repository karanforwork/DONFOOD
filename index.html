<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Healthy Food Lion Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:#222;
color:white;
overflow:hidden;
}

video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#ui{
position:absolute;
top:0;
width:100%;
}

h1{
font-size:40px;
margin-top:20px;
}

#lion{
font-size:80px;
margin-top:10px;
}

#food{
font-size:90px;
margin-top:10px;
}

#score{
position:absolute;
left:20px;
top:20px;
font-size:30px;
}

#timer{
position:absolute;
right:20px;
top:20px;
font-size:30px;
}

.buttons{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-around;
}

button{
width:280px;
height:120px;
font-size:30px;
border-radius:30px;
border:none;
color:white;
font-weight:bold;
}

#left{
background:#e53935;
}

#right{
background:#43a047;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="ui">

<div id="score">⭐ Score 0</div>
<div id="timer">⏱ 60</div>

<h1>🦁 Healthy Food Game</h1>

<div id="lion">🦁</div>
<div id="food">🍎</div>

</div>

<div class="buttons">

<button id="left">🔴 กินแต่น้อย</button>
<button id="right">🟢 กินบ่อย</button>

</div>

<audio id="correct">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<audio id="wrong">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>

const foods = [

{emoji:"🍎",type:"good"},
{emoji:"🥦",type:"good"},
{emoji:"🥕",type:"good"},
{emoji:"🍌",type:"good"},

{emoji:"🍔",type:"bad"},
{emoji:"🍟",type:"bad"},
{emoji:"🍕",type:"bad"},
{emoji:"🍩",type:"bad"}

];

let current;
let score=0;
let time=60;

const foodDiv=document.getElementById("food");
const scoreDiv=document.getElementById("score");
const timerDiv=document.getElementById("timer");

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)];
foodDiv.innerText=current.emoji;

}

function answer(type){

if(current.type==="good" && type==="right"){
correct();
}

else if(current.type==="bad" && type==="left"){
correct();
}

else{
wrong();
}

newFood();

}

function correct(){

score++;
scoreDiv.innerText="⭐ Score "+score;

document.getElementById("correct").play();

}

function wrong(){

document.getElementById("wrong").play();

}

newFood();

setInterval(()=>{

time--;
timerDiv.innerText="⏱ "+time;

if(time<=0){

alert("หมดเวลา คะแนน = "+score);
location.reload();

}

},1000);

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
video.srcObject=stream;
});

const hands = new Hands({
locateFile: file => {
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}
});

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

let cooldown=false;

hands.onResults(results=>{

if(!results.multiHandLandmarks)return;

const hand=results.multiHandLandmarks[0];

const palm=hand[9];

let x=palm.x*window.innerWidth;
let y=palm.y*window.innerHeight;

const leftBtn=document.getElementById("left").getBoundingClientRect();
const rightBtn=document.getElementById("right").getBoundingClientRect();

if(!cooldown){

if(
x>leftBtn.left &&
x<leftBtn.right &&
y>leftBtn.top &&
y<leftBtn.bottom
){

cooldown=true;
answer("left");
setTimeout(()=>cooldown=false,800);

}

if(
x>rightBtn.left &&
x<rightBtn.right &&
y>rightBtn.top &&
y<rightBtn.bottom
){

cooldown=true;
answer("right");
setTimeout(()=>cooldown=false,800);

}

}

});

const camera = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();

</script>

</body>
</html>
