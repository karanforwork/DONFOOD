<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Healthy Food Lion Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
background:black;
color:white;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

#cursor{
position:absolute;
width:60px;
height:60px;
background:#00ff88;
border:5px solid white;
border-radius:50%;
transform:translate(-30px,-30px);
pointer-events:none;
}

#score{
position:absolute;
left:20px;
top:20px;
font-size:32px;
}

#timer{
position:absolute;
right:20px;
top:20px;
font-size:32px;
}

#lion{
position:absolute;
top:90px;
width:100%;
text-align:center;
font-size:80px;
}

#food{
position:absolute;
top:170px;
width:100%;
text-align:center;
font-size:120px;
}

.buttons{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-around;
}

button{
width:300px;
height:140px;
border:none;
border-radius:30px;
font-size:34px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

#leader{
position:absolute;
right:20px;
top:120px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:15px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="cursor"></div>

<div id="score">⭐ 0</div>
<div id="timer">⏱ 60</div>

<div id="lion">🦁</div>
<div id="food">🍎</div>

<div class="buttons">

<button id="green" class="green">🟢 กินบ่อย</button>
<button id="yellow" class="yellow">🟡 กินพอดี</button>
<button id="red" class="red">🔴 กินแต่น้อย</button>

</div>

<div id="leader">
🏆 Leaderboard
<div id="board"></div>
</div>

<script>

const foods=[
{emoji:"🥦",type:"green"},
{emoji:"🍎",type:"green"},
{emoji:"🥕",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍜",type:"yellow"},
{emoji:"🥪",type:"yellow"},

{emoji:"🍟",type:"red"},
{emoji:"🍔",type:"red"},
{emoji:"🍩",type:"red"}
]

let score=0
let time=60
let current

const foodEl=document.getElementById("food")
const lion=document.getElementById("lion")

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)]

foodEl.innerText=current.emoji

}

function answer(type){

if(type===current.type){

score++

document.getElementById("score").innerText="⭐ "+score

lion.innerText="🦁😋"

setTimeout(()=>{

lion.innerText="🦁"

},500)

}

newFood()

}

newFood()

setInterval(()=>{

time--

document.getElementById("timer").innerText="⏱ "+time

if(time<=0){

saveScore()

alert("หมดเวลา คะแนน "+score)

location.reload()

}

},1000)

function saveScore(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

scores.push(score)

scores.sort((a,b)=>b-a)

scores=scores.slice(0,5)

localStorage.setItem("scores",JSON.stringify(scores))

showBoard()

}

function showBoard(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

let html=""

scores.forEach(s=>{

html+="<div>"+s+"</div>"

})

document.getElementById("board").innerHTML=html

}

showBoard()

const video=document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true})

.then(stream=>{

video.srcObject=stream

})

const hands=new Hands({

locateFile:file=>{

return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`

}

})

hands.setOptions({

maxNumHands:1,

minDetectionConfidence:0.7,

minTrackingConfidence:0.7

})

let holdTime=0

let lastBtn=null

hands.onResults(results=>{

if(!results.multiHandLandmarks) return

const hand=results.multiHandLandmarks[0]

const palm=hand[9]

let x=(1-palm.x)*window.innerWidth

let y=palm.y*window.innerHeight

const cursor=document.getElementById("cursor")

cursor.style.left=x+"px"

cursor.style.top=y+"px"

checkButton(x,y)

})

function checkButton(x,y){

let btn=null

const g=document.getElementById("green").getBoundingClientRect()

const yb=document.getElementById("yellow").getBoundingClientRect()

const r=document.getElementById("red").getBoundingClientRect()

if(x>g.left && x<g.right && y>g.top && y<g.bottom) btn="green"

if(x>yb.left && x<yb.right && y>yb.top && y<yb.bottom) btn="yellow"

if(x>r.left && x<r.right && y>r.top && y<r.bottom) btn="red"

if(btn===lastBtn){

holdTime++

if(holdTime>25){

answer(btn)

holdTime=0

}

}else{

holdTime=0

lastBtn=btn

}

}

const camera=new Camera(video,{

onFrame:async()=>{

await hands.send({image:video})

},

width:640,

height:480

})

camera.start()

</script>

</body>
</html>
