<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lion Food</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:#000;
color:white;
overflow:hidden;
}

h1{
position:absolute;
top:10px;
width:100%;
font-size:42px;
z-index:2;
}

#timer{
position:absolute;
top:80px;
left:20px;
font-size:30px;
z-index:2;
}

#score{
position:absolute;
top:80px;
right:20px;
font-size:30px;
z-index:2;
}

#video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
}

#cursor{
position:fixed;
width:40px;
height:40px;
background:red;
border-radius:50%;
pointer-events:none;
z-index:3;
}

.container{
position:absolute;
bottom:40px;
width:100%;
z-index:2;
}

.food{
font-size:38px;
margin-bottom:10px;
}

#foodImage{
width:120px;
height:120px;
object-fit:contain;
margin-bottom:10px;
}

button{
font-size:30px;
padding:25px;
margin:15px;
border:none;
border-radius:14px;
width:260px;
}

.green{background:#4CAF50;color:white}
.yellow{background:#FFC107}
.red{background:#F44336;color:white}

</style>
</head>

<body>

<h1>🦁 Lion Food</h1>

<div id="timer">เวลา: 60</div>
<div id="score">คะแนน: 0</div>

<video id="video" autoplay playsinline></video>
<div id="cursor"></div>

<div class="container">

<img id="foodImage">

<div id="food" class="food"></div>

<button class="green" id="g">เขียว</button>
<button class="yellow" id="y">เหลือง</button>
<button class="red" id="r">แดง</button>

</div>

<script>

const foods=[
{name:"ผักบุ้ง",type:"green",img:"🥬"},
{name:"แครอท",type:"green",img:"🥕"},
{name:"บรอกโคลี",type:"green",img:"🥦"},
{name:"แตงกวา",type:"green",img:"🥒"},
{name:"กล้วย",type:"yellow",img:"🍌"},
{name:"ข้าว",type:"yellow",img:"🍚"},
{name:"มันฝรั่ง",type:"yellow",img:"🥔"},
{name:"ขนมปัง",type:"yellow",img:"🍞"},
{name:"ไข่",type:"yellow",img:"🥚"},
{name:"มะม่วง",type:"yellow",img:"🥭"},
{name:"ส้ม",type:"yellow",img:"🍊"},
{name:"เค้ก",type:"red",img:"🍰"},
{name:"ไอศกรีม",type:"red",img:"🍦"},
{name:"น้ำอัดลม",type:"red",img:"🥤"},
{name:"ลูกอม",type:"red",img:"🍬"},
{name:"โดนัท",type:"red",img:"🍩"},
{name:"ช็อกโกแลต",type:"red",img:"🍫"},
{name:"เฟรนช์ฟราย",type:"red",img:"🍟"}
];

let current;
let score=0;
let time=60;

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)];

document.getElementById("food").innerText=current.name;

document.getElementById("foodImage").innerText=current.img;

}

function answer(type){

if(type==current.type){
score++;
}

document.getElementById("score").innerText="คะแนน: "+score;

newFood();

}

document.getElementById("g").onclick=()=>answer("green");
document.getElementById("y").onclick=()=>answer("yellow");
document.getElementById("r").onclick=()=>answer("red");

newFood();

setInterval(()=>{

time--;

document.getElementById("timer").innerText="เวลา: "+time;

if(time<=0){

alert("หมดเวลา คะแนน "+score);

location.reload();

}

},1000);

const video=document.getElementById("video");
const cursor=document.getElementById("cursor");

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.75,
minTrackingConfidence:0.75
});

let hoverButton=null;
let hoverStart=0;

let smoothX=0;
let smoothY=0;

hands.onResults(results=>{

if(!results.multiHandLandmarks || results.multiHandLandmarks.length==0){
return;
}

let p=results.multiHandLandmarks[0][8];

let targetX=(1-p.x)*window.innerWidth;
let targetY=p.y*window.innerHeight;

smoothX=smoothX*0.75+targetX*0.25;
smoothY=smoothY*0.75+targetY*0.25;

cursor.style.left=smoothX+"px";
cursor.style.top=smoothY+"px";

checkHover(smoothX,smoothY);

});

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:1280,
height:720
});

camera.start();

function checkHover(x,y){

let buttons=document.querySelectorAll("button");

let found=null;

buttons.forEach(btn=>{

let r=btn.getBoundingClientRect();

if(
x>r.left &&
x<r.right &&
y>r.top &&
y<r.bottom
){
found=btn;
}

});

if(found){

if(found!==hoverButton){
hoverButton=found;
hoverStart=Date.now();
}

if(Date.now()-hoverStart>800){
found.click();
hoverButton=null;
}

}else{

hoverButton=null;

}

}

</script>

</body>
</html>
