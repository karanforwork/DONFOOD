<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lion Food PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:#000;
color:white;
overflow:hidden;
}

h1{
font-size:50px;
}

.screen{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
}

#cursor{
position:fixed;
width:50px;
height:50px;
background:red;
border-radius:50%;
pointer-events:none;
z-index:5;
opacity:0.8;
}

#timer{
position:absolute;
top:80px;
left:20px;
font-size:32px;
z-index:2;
}

#score{
position:absolute;
top:80px;
right:20px;
font-size:32px;
z-index:2;
}

.container{
position:absolute;
bottom:60px;
width:100%;
z-index:2;
}

.food{
font-size:80px;
margin-bottom:20px;
}

button{
font-size:34px;
padding:28px;
margin:15px;
border:none;
border-radius:16px;
width:280px;
transition:transform 0.1s;
}

button:hover{
transform:scale(1.05);
}

.green{background:#4CAF50;color:white}
.yellow{background:#FFC107}
.red{background:#F44336;color:white}

</style>
</head>

<body>

<div id="startScreen" class="screen">

<h1>🦁 Lion Food</h1>
<p style="font-size:32px;">ชี้มือไปที่ปุ่มเพื่อเริ่มเกม</p>
<button id="startBtn">▶️ เริ่มเกม</button>

</div>


<div id="endScreen" class="screen" style="display:none;">

<h1>🏆 จบเกม</h1>
<div id="finalScore" style="font-size:42px;margin:20px;"></div>
<button id="restartBtn">🔁 เล่นอีกครั้ง</button>

</div>


<h1 style="position:absolute;top:10px;width:100%;z-index:2;">🦁 Lion Food</h1>

<div id="timer">เวลา: 60</div>
<div id="score">คะแนน: 0</div>

<video id="video" autoplay playsinline></video>

<div id="cursor"></div>


<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1f63.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2a0a6f1f70.mp3"></audio>


<div class="container">

<div id="food" class="food"></div>

<button class="green" id="g">🟢 กินได้บ่อย</button>
<button class="yellow" id="y">🟡 กินแต่พอดี</button>
<button class="red" id="r">🔴 กินนานๆครั้ง</button>

</div>


<script>

let gameStarted=false;

const foods=[

// 🟢 กินได้บ่อย (อาหารดี)
{name:"🥦 บรอกโคลี",type:"green"},
{name:"🥕 แครอท",type:"green"},
{name:"🥬 ผักใบเขียว",type:"green"},
{name:"🥒 แตงกวา",type:"green"},
{name:"🍎 แอปเปิล",type:"green"},
{name:"🍊 ส้ม",type:"green"},
{name:"🍉 แตงโม",type:"green"},

// 🟡 กินได้แต่พอดี (ให้พลังงาน)
{name:"🍚 ข้าว",type:"yellow"},
{name:"🍞 ขนมปัง",type:"yellow"},
{name:"🍌 กล้วย",type:"yellow"},
{name:"🥔 มันฝรั่ง",type:"yellow"},
{name:"🥚 ไข่",type:"yellow"},
{name:"🥛 นม",type:"yellow"},

// 🔴 กินนานๆครั้ง (ของหวาน / ไขมันสูง)
{name:"🍰 เค้ก",type:"red"},
{name:"🍦 ไอศกรีม",type:"red"},
{name:"🍩 โดนัท",type:"red"},
{name:"🍬 ลูกอม",type:"red"},
{name:"🍫 ช็อกโกแลต",type:"red"},
{name:"🍟 เฟรนช์ฟราย",type:"red"},
{name:"🥤 น้ำอัดลม",type:"red"}

];

let current;
let score=0;
let time=60;

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)];
document.getElementById("food").innerText=current.name;

}

function answer(type){

if(!gameStarted)return;

if(type==current.type){

score++;
document.getElementById("correctSound").play();

}else{

document.getElementById("wrongSound").play();

}

document.getElementById("score").innerText="คะแนน: "+score;

newFood();

}

document.getElementById("g").onclick=()=>answer("green");
document.getElementById("y").onclick=()=>answer("yellow");
document.getElementById("r").onclick=()=>answer("red");


document.getElementById("startBtn").onclick=()=>{

document.getElementById("startScreen").style.display="none";
gameStarted=true;
newFood();

};


document.getElementById("restartBtn").onclick=()=>{

location.reload();

};


setInterval(()=>{

if(!gameStarted)return;

time--;

document.getElementById("timer").innerText="เวลา: "+time;

if(time<=0){

document.getElementById("finalScore").innerText="คะแนนของคุณ: "+score;
document.getElementById("endScreen").style.display="flex";
gameStarted=false;

}

},1000);


const video=document.getElementById("video");
const cursor=document.getElementById("cursor");


const hands=new Hands({

locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`

});


hands.setOptions({

maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.8,
minTrackingConfidence:0.8

});


let hoverButton=null;
let hoverStart=0;

let smoothX=0;
let smoothY=0;


hands.onResults(results=>{

if(!results.multiHandLandmarks || results.multiHandLandmarks.length==0){
return;
}

let p=results.multiHandLandmarks[0][8];

let targetX=(1-p.x)*window.innerWidth;
let targetY=p.y*window.innerHeight;

smoothX=smoothX*0.85+targetX*0.15;
smoothY=smoothY*0.85+targetY*0.15;

cursor.style.left=smoothX+"px";
cursor.style.top=smoothY+"px";

checkHover(smoothX,smoothY);

});


const camera=new Camera(video,{

onFrame:async()=>{

await hands.send({image:video});

},

width:1280,
height:720

});


camera.start();


function checkHover(x,y){

let buttons=document.querySelectorAll("button");

let found=null;

buttons.forEach(btn=>{

let r=btn.getBoundingClientRect();

let padding=40;

if(

x>r.left-padding &&
x<r.right+padding &&
y>r.top-padding &&
y<r.bottom+padding

){

found=btn;

}

});


if(found){

if(found!==hoverButton){

hoverButton=found;
hoverStart=Date.now();

}

if(Date.now()-hoverStart>1000){

found.click();
hoverButton=null;

}

}else{

hoverButton=null;

}

}

</script>

</body>
</html>
