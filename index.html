<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vocab Camera Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
text-align:center;
color:white;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

.word{
position:absolute;
top:20%;
width:100%;
font-size:80px;
font-weight:bold;
}

.score{
position:absolute;
top:20px;
right:30px;
font-size:30px;
}

.timer{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:40px;
background:black;
padding:10px 20px;
border-radius:20px;
}

.choice{
position:absolute;
width:300px;
height:300px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:120px;
}

.left{
left:5%;
top:50%;
transform:translateY(-50%);
}

.right{
right:5%;
top:50%;
transform:translateY(-50%);
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="timer" id="timer">60</div>
<div class="score">Score: <span id="score">0</span></div>

<div class="word" id="word">fish</div>

<div class="choice left" id="left">🐟</div>
<div class="choice right" id="right">🥓</div>

<script>

const words=[
{word:"fish",correct:"🐟",wrong:"🥓"},
{word:"apple",correct:"🍎",wrong:"🍔"},
{word:"banana",correct:"🍌",wrong:"🍟"},
{word:"milk",correct:"🥛",wrong:"🍩"},
{word:"egg",correct:"🥚",wrong:"🍬"}
]

let current
let score=0

function next(){

current=words[Math.floor(Math.random()*words.length)]

document.getElementById("word").innerText=current.word

if(Math.random()>0.5){

left.innerText=current.correct
right.innerText=current.wrong
left.dataset.correct="true"
right.dataset.correct="false"

}else{

left.innerText=current.wrong
right.innerText=current.correct
left.dataset.correct="false"
right.dataset.correct="true"

}

}

function choose(side){

if(side.dataset.correct==="true"){
score++
document.getElementById("score").innerText=score
}

next()

}

left.onclick=()=>choose(left)
right.onclick=()=>choose(right)

next()

// camera

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

let time=60

setInterval(()=>{

time--
timer.innerText=time

if(time<=0){

alert("Game Over! Score "+score)
location.reload()

}

},1000)

</script>

</body>
</html>
