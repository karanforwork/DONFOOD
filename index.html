<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Healthy Food Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
}

/* กล้อง */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

/* UI */

#title{
font-size:42px;
margin-top:20px;
font-weight:bold;
text-shadow:0 0 10px black;
}

#lion{
font-size:90px;
transition:0.3s;
}

#food{
font-size:130px;
margin-top:10px;
}

#choices{
display:flex;
justify-content:center;
gap:60px;
margin-top:30px;
}

.choice{
padding:25px 70px;
font-size:30px;
border-radius:25px;
transition:0.2s;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.choice:hover{
transform:scale(1.1);
}

.green{background:#22c55e}
.yellow{background:#eab308}
.red{background:#ef4444}

.glow{
box-shadow:0 0 30px yellow;
transform:scale(1.1);
}

#hud{
margin-top:25px;
font-size:26px;
text-shadow:0 0 10px black;
}

#cursor{
position:absolute;
width:45px;
height:45px;
border-radius:50%;
background:yellow;
opacity:0.8;
pointer-events:none;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="cursor"></div>

<div id="title">🦁 Healthy Food Game</div>
<div id="lion">🦁</div>
<div id="food"></div>
<div id="choices"></div>

<div id="hud">
⏱ <span id="time">60</span>
⭐ Score <span id="score">0</span>
🏆 Best <span id="best">0</span>
</div>

<script>

const foods=[

{emoji:"🍎",type:"green"},
{emoji:"🥦",type:"green"},
{emoji:"🍉",type:"green"},
{emoji:"🍌",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍞",type:"yellow"},
{emoji:"🥚",type:"yellow"},
{emoji:"🍗",type:"yellow"},

{emoji:"🍔",type:"red"},
{emoji:"🍟",type:"red"},
{emoji:"🍕",type:"red"},
{emoji:"🍩",type:"red"}

]

let currentFood
let score=0
let time=60
let best=localStorage.getItem("bestScore") || 0

const foodEl=document.getElementById("food")
const choicesEl=document.getElementById("choices")
const scoreEl=document.getElementById("score")
const timeEl=document.getElementById("time")
const bestEl=document.getElementById("best")
const cursor=document.getElementById("cursor")
const lion=document.getElementById("lion")

bestEl.innerText=best

let hoverButton=null
let hoverStart=0

function newRound(){

currentFood=foods[Math.floor(Math.random()*foods.length)]
foodEl.innerText=currentFood.emoji

choicesEl.innerHTML=""

let types=["green","yellow","red"]

types.sort(()=>0.5-Math.random())
types=types.slice(0,2)

types.forEach(type=>{

let btn=document.createElement("div")
btn.className="choice "+type
btn.dataset.type=type

if(type=="green")btn.innerText="🟢 กินได้บ่อย"
if(type=="yellow")btn.innerText="🟡 กินพอดี"
if(type=="red")btn.innerText="🔴 กินแต่น้อย"

choicesEl.appendChild(btn)

})

}

function answer(type){

if(type==currentFood.type){

score++
scoreEl.innerText=score

lion.style.transform="scale(1.4)"

setTimeout(()=>lion.style.transform="scale(1)",300)

new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_coin.mp3").play()

}else{

new Audio("https://cdn.pixabay.com/audio/2022/03/10/audio_error.mp3").play()

}

newRound()

}

function checkTouch(x,y){

let touched=null

document.querySelectorAll(".choice").forEach(btn=>{

btn.classList.remove("glow")

let r=btn.getBoundingClientRect()

if(x>r.left && x<r.right && y>r.top && y<r.bottom){

touched=btn
btn.classList.add("glow")

}

})

if(touched){

if(hoverButton!=touched){

hoverButton=touched
hoverStart=Date.now()

}

if(Date.now()-hoverStart>700){

answer(touched.dataset.type)
hoverButton=null

}

}else{

hoverButton=null

}

}

const video=document.getElementById("video")

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks){

let hand=results.multiHandLandmarks[0]
let palm=hand[9]

let x=(1-palm.x)*window.innerWidth
let y=palm.y*window.innerHeight

cursor.style.left=x+"px"
cursor.style.top=y+"px"

checkTouch(x,y)

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:1280,
height:720
})

camera.start()

setInterval(()=>{

time--
timeEl.innerText=time

if(time<=0){

if(score>best){
localStorage.setItem("bestScore",score)
}

alert("Game Over! Score: "+score)
location.reload()

}

},1000)

newRound()

</script>

</body>
</html>
