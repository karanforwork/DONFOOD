<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Healthy Food Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:black;
color:white;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-1;
}

#ui{
position:absolute;
top:0;
width:100%;
padding-top:40px;
}

.food{
font-size:90px;
margin:10px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.btn{
padding:20px 40px;
font-size:22px;
border-radius:15px;
color:white;
}

.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

.score{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>

<div id="ui">

<h1>🦁 Healthy Food Game</h1>

<div class="food" id="food">🍔</div>

<div class="buttons">

<div class="btn green" id="left">🟢 กินได้บ่อย</div>
<div class="btn yellow" id="right">🟡 กินพอดี</div>

</div>

<div class="score">
⏱ <span id="time">60</span>
⭐ Score <span id="score">0</span>
</div>

</div>

<script>

const foods = [
{emoji:"🍎",type:"green"},
{emoji:"🥦",type:"green"},
{emoji:"🍌",type:"yellow"},
{emoji:"🍞",type:"yellow"},
{emoji:"🍟",type:"red"},
{emoji:"🍔",type:"red"}
]

let current
let score=0
let time=60

function newFood(){
current=foods[Math.floor(Math.random()*foods.length)]
food.innerHTML=current.emoji
}

newFood()

setInterval(()=>{
time--
document.getElementById("time").innerText=time
if(time<=0){
alert("Game Over Score "+score)
location.reload()
}
},1000)

function answer(side){

let correct=false

if(side=="left" && current.type=="green") correct=true
if(side=="right" && current.type=="yellow") correct=true

if(correct){
score++
document.getElementById("score").innerText=score
}

newFood()
}

const video=document.getElementById("cam")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks){

let hand=results.multiHandLandmarks[0]

let x=hand[9].x*window.innerWidth
let y=hand[9].y*window.innerHeight

let left=document.getElementById("left").getBoundingClientRect()
let right=document.getElementById("right").getBoundingClientRect()

if(x>left.left && x<left.right && y>left.top && y<left.bottom){
answer("left")
}

if(x>right.left && x<right.right && y>right.top && y<right.bottom){
answer("right")
}

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

camera.start()

</script>

</body>
</html>
