<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เกมอาหาร 3 สี</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
text-align:center;
color:white;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

#food{
font-size:70px;
margin-top:120px;
}

.score{
position:absolute;
top:20px;
right:20px;
font-size:28px;
}

.timer{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:36px;
background:black;
padding:10px 20px;
border-radius:20px;
}

.choice{
position:absolute;
width:260px;
height:260px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
color:white;
}

.left{left:5%;top:50%;transform:translateY(-50%)}
.center{left:50%;top:65%;transform:translateX(-50%)}
.right{right:5%;top:50%;transform:translateY(-50%)}

.green{background:#2ecc71}
.yellow{background:#f1c40f;color:black}
.red{background:#e74c3c}

#mode{
position:absolute;
top:20px;
left:20px;
z-index:2;
}

#leaderboard{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
font-size:18px;
}
</style>
</head>

<body>

<select id="mode">
<option value="click">โหมดคลิก</option>
<option value="hand">โหมดมือ</option>
</select>

<video id="video" autoplay playsinline></video>

<div class="timer" id="timer">60</div>
<div class="score">คะแนน: <span id="score">0</span></div>

<div id="food"></div>

<div id="green" class="choice green left">เขียว</div>
<div id="yellow" class="choice yellow center">เหลือง</div>
<div id="red" class="choice red right">แดง</div>

<div id="leaderboard"></div>

<script>

const foods=[

{name:"แอปเปิล 🍎",color:"green"},
{name:"กล้วย 🍌",color:"green"},
{name:"แตงโม 🍉",color:"green"},
{name:"บรอกโคลี 🥦",color:"green"},
{name:"แครอท 🥕",color:"green"},
{name:"แตงกวา 🥒",color:"green"},

{name:"ข้าว 🍚",color:"yellow"},
{name:"ไข่ 🍳",color:"yellow"},
{name:"นม 🥛",color:"yellow"},
{name:"ข้าวโพด 🌽",color:"yellow"},
{name:"มันฝรั่ง 🥔",color:"yellow"},
{name:"ขนมปัง 🍞",color:"yellow"},

{name:"โดนัท 🍩",color:"red"},
{name:"เค้ก 🍰",color:"red"},
{name:"ลูกอม 🍬",color:"red"},
{name:"น้ำอัดลม 🥤",color:"red"},
{name:"เฟรนช์ฟราย 🍟",color:"red"},
{name:"เบอร์เกอร์ 🍔",color:"red"}

]

let current
let score=0

function nextFood(){
current=foods[Math.floor(Math.random()*foods.length)]
document.getElementById("food").innerText=current.name
}

function choose(color){
if(color===current.color){
score++
document.getElementById("score").innerText=score
}
nextFood()
}

document.getElementById("green").onclick=()=>choose("green")
document.getElementById("yellow").onclick=()=>choose("yellow")
document.getElementById("red").onclick=()=>choose("red")

nextFood()

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

let time=60

setInterval(()=>{
time--
timer.innerText=time

if(time<=0){
saveScore(score)
alert("จบเกม คะแนน "+score)
location.reload()
}

},1000)

function saveScore(s){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

scores.push(s)

scores.sort((a,b)=>b-a)

scores=scores.slice(0,5)

localStorage.setItem("scores",JSON.stringify(scores))

showScores()

}

function showScores(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

document.getElementById("leaderboard").innerHTML="Top Scores: "+scores.join(" , ")

}

showScores()

const hands=new Hands({
locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(document.getElementById("mode").value!=="hand") return

if(results.multiHandLandmarks.length>0){

const x=results.multiHandLandmarks[0][8].x

if(x<0.33) choose("green")
else if(x<0.66) choose("yellow")
else choose("red")

}

})

const camera=new Camera(video,{
onFrame:async()=>{await hands.send({image:video})},
width:640,
height:480
})

camera.start()

</script>

</body>
</html>
