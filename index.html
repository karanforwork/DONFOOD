<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Healthy Food Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#111827;
padding:15px;
font-size:32px;
}

#lion{
font-size:70px;
transition:0.2s;
}

#food{
font-size:120px;
margin:20px;
}

#choices{
display:flex;
justify-content:center;
gap:50px;
margin-top:20px;
}

.choice{
width:260px;
padding:30px;
font-size:28px;
border-radius:16px;
}

.green{background:#22c55e}
.yellow{background:#eab308}
.red{background:#ef4444}

#hud{
margin-top:20px;
font-size:24px;
}

video{
position:fixed;
bottom:10px;
right:10px;
width:200px;
border-radius:10px;
}
</style>
</head>

<body>

<header>🦁 Healthy Food Game</header>

<div id="lion">🦁</div>

<div id="food">🍎</div>

<div id="choices"></div>

<div id="hud">
⏱ <span id="time">60</span> |
⭐ Score <span id="score">0</span> |
🏆 Best <span id="best">0</span>
</div>

<video id="video" autoplay></video>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_chinese_new_year_drum.mp3">
</audio>

<script>

const foods=[
{emoji:"🍎",type:"green"},
{emoji:"🥦",type:"green"},
{emoji:"🍌",type:"green"},
{emoji:"🍉",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍞",type:"yellow"},
{emoji:"🥚",type:"yellow"},
{emoji:"🍗",type:"yellow"},

{emoji:"🍔",type:"red"},
{emoji:"🍟",type:"red"},
{emoji:"🍕",type:"red"},
{emoji:"🍩",type:"red"}
]

let score=0
let time=60
let currentFood
let lock=false

const foodEl=document.getElementById("food")
const choicesEl=document.getElementById("choices")
const scoreEl=document.getElementById("score")
const timeEl=document.getElementById("time")
const lion=document.getElementById("lion")
const bestEl=document.getElementById("best")

let best=localStorage.getItem("lionBest")||0
bestEl.innerText=best

function newRound(){

currentFood=foods[Math.floor(Math.random()*foods.length)]
foodEl.innerText=currentFood.emoji

choicesEl.innerHTML=""

let types=["green","yellow","red"]
types.sort(()=>0.5-Math.random())
types=types.slice(0,2)

types.forEach(type=>{

let div=document.createElement("div")
div.className="choice "+type
div.dataset.type=type

if(type=="green")div.innerText="🟢 กินได้บ่อย"
if(type=="yellow")div.innerText="🟡 กินพอดี"
if(type=="red")div.innerText="🔴 กินแต่น้อย"

choicesEl.appendChild(div)

})

}

function answer(type){

if(lock)return
lock=true

if(type==currentFood.type){

score++
scoreEl.innerText=score

lion.style.transform="scale(1.4)"
setTimeout(()=>{lion.style.transform="scale(1)"},200)

}

setTimeout(()=>{
lock=false
newRound()
},400)

}

function checkTouch(x,y){

document.querySelectorAll(".choice").forEach(btn=>{

let r=btn.getBoundingClientRect()

if(
x>r.left &&
x<r.right &&
y>r.top &&
y<r.bottom
){
answer(btn.dataset.type)
}

})

}

const video=document.getElementById("video")

const hands=new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks){

let hand=results.multiHandLandmarks[0]
let palm=hand[9]

let x=palm.x*window.innerWidth
let y=palm.y*window.innerHeight

checkTouch(x,y)

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

camera.start()

setInterval(()=>{

time--
timeEl.innerText=time

if(time<=0){

if(score>best){
localStorage.setItem("lionBest",score)
}

alert("Game Over! Score: "+score)
location.reload()

}

},1000)

newRound()

</script>

</body>
</html>
