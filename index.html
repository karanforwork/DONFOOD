<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เกมอาหาร 3 สี 🦁</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#b30000,#ffcc00);
text-align:center;
color:white;
overflow:hidden;
}

h1{
font-size:50px;
margin-top:10px;
}

#game{
margin-top:20px;
}

.food{
font-size:60px;
margin:30px;
}

button{
font-size:40px;
padding:30px;
margin:20px;
width:300px;
border:none;
border-radius:20px;
cursor:pointer;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

#pointer{
position:absolute;
width:40px;
height:40px;
background:cyan;
border-radius:50%;
pointer-events:none;
}

video{
position:absolute;
right:10px;
bottom:10px;
width:200px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🦁 เกมอาหาร 3 สี</h1>

<div id="game">
<div class="food" id="food">🍎</div>

<button class="green" onclick="answer('green')">เขียว</button>
<button class="yellow" onclick="answer('yellow')">เหลือง</button>
<button class="red" onclick="answer('red')">แดง</button>

<h2 id="score">คะแนน 0</h2>
</div>

<div id="pointer"></div>

<video id="video" autoplay playsinline></video>

<audio id="drum" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3a36d62c36.mp3?filename=chinese-drum-110045.mp3"></audio>

<script>

const foods=[
{name:"🥦",type:"green"},
{name:"🥬",type:"green"},
{name:"🥒",type:"green"},
{name:"🍏",type:"green"},
{name:"🥑",type:"green"},
{name:"🥕",type:"yellow"},
{name:"🌽",type:"yellow"},
{name:"🍌",type:"yellow"},
{name:"🍍",type:"yellow"},
{name:"🥭",type:"yellow"},
{name:"🍟",type:"red"},
{name:"🍔",type:"red"},
{name:"🍕",type:"red"},
{name:"🍩",type:"red"},
{name:"🍗",type:"red"},
{name:"🍉",type:"green"},
{name:"🍋",type:"yellow"},
{name:"🥨",type:"red"},
{name:"🍠",type:"yellow"},
{name:"🥗",type:"green"}
]

let current
let score=0

function newFood(){
current=foods[Math.floor(Math.random()*foods.length)]
document.getElementById("food").innerText=current.name
}

function answer(color){

if(color==current.type){
score++
document.getElementById("drum").play()
}

document.getElementById("score").innerText="คะแนน "+score
newFood()

}

newFood()

const video=document.getElementById("video")
const pointer=document.getElementById("pointer")

const hands=new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks.length>0){

const hand=results.multiHandLandmarks[0]

const x=hand[8].x*window.innerWidth
const y=hand[8].y*window.innerHeight

pointer.style.left=x+"px"
pointer.style.top=y+"px"

const buttons=document.querySelectorAll("button")

buttons.forEach(btn=>{

const rect=btn.getBoundingClientRect()

if(
x>rect.left &&
x<rect.right &&
y>rect.top &&
y<rect.bottom
){

btn.click()

}

})

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

camera.start()

</script>

</body>
</html>
