<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Healthy Food Lion Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:black;
color:white;
text-align:center;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

#ui{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:28px;
}

#food{
font-size:80px;
margin-top:40px;
}

.choices{
position:absolute;
bottom:60px;
width:100%;
display:flex;
justify-content:space-around;
}

.choice{
width:200px;
height:120px;
border-radius:20px;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

.glow{
box-shadow:0 0 40px white;
transform:scale(1.1);
}

#lion{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
font-size:80px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%{transform:translateX(-50%) translateY(0)}
50%{transform:translateX(-50%) translateY(-10px)}
100%{transform:translateX(-50%) translateY(0)}
}

#timer{
position:absolute;
top:20px;
right:30px;
font-size:30px;
}

#score{
position:absolute;
top:20px;
left:30px;
font-size:30px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="lion">🦁</div>

<div id="score">Score: 0</div>
<div id="timer">60</div>

<div id="ui">

<div id="food">🍎</div>

</div>

<div class="choices">

<div class="choice green" data-type="green">
🟢 กินบ่อย
</div>

<div class="choice yellow" data-type="yellow">
🟡 กินพอดี
</div>

<div class="choice red" data-type="red">
🔴 กินแต่น้อย
</div>

</div>

<audio id="music" loop
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_cfdc0f0eaa.mp3?filename=chinese-new-year-112194.mp3">
</audio>

<audio id="correct"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5d5a1a4f98.mp3?filename=success-1-6297.mp3">
</audio>

<script>

const video=document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

const foods=[
{emoji:"🍎",type:"green"},
{emoji:"🥦",type:"green"},
{emoji:"🍌",type:"yellow"},
{emoji:"🥚",type:"yellow"},
{emoji:"🍟",type:"red"},
{emoji:"🍔",type:"red"}
]

let current=null
let score=0
let time=60

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)]

document.getElementById("food").innerText=current.emoji

}

function answer(type){

if(type===current.type){

score++
document.getElementById("correct").play()

}

document.getElementById("score").innerText="Score: "+score

newFood()

}

document.querySelectorAll(".choice").forEach(btn=>{
btn.onclick=()=>answer(btn.dataset.type)
})

newFood()

setInterval(()=>{

time--

document.getElementById("timer").innerText=time

if(time<=0){
alert("หมดเวลา คะแนน: "+score)
location.reload()
}

},1000)

document.body.onclick=()=>{
document.getElementById("music").play()
}

</script>

</body>
</html>
