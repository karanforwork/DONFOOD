<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Lion Dance Food Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;
background:#8B0000;
}

/* กล้องเต็มจอ */

#video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
z-index:-2;
opacity:0.25;
}

/* พื้นหลังตรุษจีน */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(120,0,0,0.35);
z-index:-1;
}

/* confetti */

.confetti{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
background-image:url("https://i.imgur.com/6RMhx.gif");
opacity:0.4;
}

/* UI */

h1{
font-size:48px;
margin-top:10px;
}

#lion{
font-size:80px;
}

#timer,#score{
font-size:28px;
}

#food{
font-size:42px;
margin-top:20px;
}

/* ปุ่ม */

.buttons{
position:absolute;
bottom:80px;
width:100%;
}

button{
font-size:36px;
padding:28px;
margin:20px;
border:none;
border-radius:16px;
width:260px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.green{background:#2ecc71;color:white}
.yellow{background:#f1c40f}
.red{background:#e74c3c;color:white}

/* cursor */

#cursor{
position:absolute;
width:40px;
height:40px;
background:gold;
border-radius:50%;
border:4px solid white;
pointer-events:none;
}

</style>
</head>

<body>

<div class="overlay"></div>
<div class="confetti"></div>

<h1>🦁 Lion Dance Food Game</h1>

<div id="lion">🦁</div>

<div id="timer">เวลา: 60</div>
<div id="score">คะแนน: 0</div>

<video id="video" autoplay></video>
<div id="cursor"></div>

<div id="food"></div>

<div class="buttons">

<button class="green" id="green">🟢 เขียว</button>
<button class="yellow" id="yellow">🟡 เหลือง</button>
<button class="red" id="red">🔴 แดง</button>

</div>

<audio id="drum" src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>

<script>

/* อาหาร 20 เมนู */

const foods=[

{name:"🥦 บรอกโคลี",type:"green"},
{name:"🥒 แตงกวา",type:"green"},
{name:"🥬 ผักกาด",type:"green"},
{name:"🥕 แครอท",type:"green"},
{name:"🥗 สลัด",type:"green"},

{name:"🍚 ข้าว",type:"yellow"},
{name:"🍌 กล้วย",type:"yellow"},
{name:"🍞 ขนมปัง",type:"yellow"},
{name:"🥔 มันฝรั่ง",type:"yellow"},
{name:"🥚 ไข่",type:"yellow"},
{name:"🍊 ส้ม",type:"yellow"},
{name:"🥭 มะม่วง",type:"yellow"},

{name:"🍰 เค้ก",type:"red"},
{name:"🍫 ช็อกโกแลต",type:"red"},
{name:"🍬 ลูกอม",type:"red"},
{name:"🍟 เฟรนช์ฟราย",type:"red"},
{name:"🍕 พิซซ่า",type:"red"},
{name:"🥤 น้ำอัดลม",type:"red"},
{name:"🍩 โดนัท",type:"red"},
{name:"🍦 ไอศกรีม",type:"red"}

]

let current
let score=0
let time=60

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)]

food.innerText=current.name

}

function answer(type){

if(type===current.type){

score++
scoreDiv.innerText="คะแนน: "+score
lion.innerText="🦁😋"
drum.play()

setTimeout(()=>lion.innerText="🦁",600)

}else{

lion.innerText="🦁😵"
setTimeout(()=>lion.innerText="🦁",600)

}

newFood()

}

green.onclick=()=>answer("green")
yellow.onclick=()=>answer("yellow")
red.onclick=()=>answer("red")

const scoreDiv=document.getElementById("score")

newFood()

/* timer */

setInterval(()=>{

time--

timer.innerText="เวลา: "+time

if(time<=0){

alert("หมดเวลา คะแนน "+score)

location.reload()

}

},1000)

/* hand tracking */

let cx=300
let cy=300

function smooth(x,y){

cx=cx+(x-cx)*0.3
cy=cy+(y-cy)*0.3

cursor.style.left=cx+"px"
cursor.style.top=cy+"px"

}

function checkHover(){

let buttons=[green,yellow,red]

buttons.forEach(b=>{

let r=b.getBoundingClientRect()

if(cx>r.left&&cx<r.right&&cy>r.top&&cy<r.bottom){

b.click()

}

})

}

const hands=new Hands({

locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`

})

hands.setOptions({

maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7

})

hands.onResults(results=>{

if(results.multiHandLandmarks.length>0){

let p=results.multiHandLandmarks[0][8]

let x=(1-p.x)*window.innerWidth
let y=p.y*window.innerHeight

smooth(x,y)

checkHover()

}

})

const video=document.getElementById("video")

const camera=new Camera(video,{

onFrame:async()=>{

await hands.send({image:video})

},

width:640,
height:480

})

camera.start()

/* fullscreen */

document.body.onclick=()=>{

document.documentElement.requestFullscreen()

}

</script>

</body>
</html>
