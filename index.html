<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🦁 Healthy Food Game</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

/* กล้องเต็มจอ */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

/* UI */

#game{
position:absolute;
width:100%;
top:0;
}

#title{
font-size:40px;
margin-top:10px;
}

#lion{
font-size:70px;
margin:10px;
}

#food{
font-size:120px;
margin-top:20px;
}

#choices{
display:flex;
justify-content:center;
gap:60px;
margin-top:30px;
}

.choice{
padding:30px 60px;
font-size:30px;
border-radius:20px;
}

.green{background:#22c55e}
.yellow{background:#eab308}
.red{background:#ef4444}

#hud{
margin-top:20px;
font-size:24px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="game">

<div id="title">🦁 Healthy Food Game</div>

<div id="lion">🦁</div>

<div id="food">🍎</div>

<div id="choices"></div>

<div id="hud">
⏱ <span id="time">60</span> |
⭐ Score <span id="score">0</span> |
🏆 Best <span id="best">0</span>
</div>

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_chinese_new_year_drum.mp3">
</audio>

<script>

const foods=[
{emoji:"🍎",type:"green"},
{emoji:"🥦",type:"green"},
{emoji:"🍉",type:"green"},
{emoji:"🍌",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍞",type:"yellow"},
{emoji:"🥚",type:"yellow"},
{emoji:"🍗",type:"yellow"},

{emoji:"🍔",type:"red"},
{emoji:"🍟",type:"red"},
{emoji:"🍕",type:"red"},
{emoji:"🍩",type:"red"}
]

let score=0
let time=60
let currentFood
let lock=false

const foodEl=document.getElementById("food")
const choicesEl=document.getElementById("choices")
const scoreEl=document.getElementById("score")
const timeEl=document.getElementById("time")

function newRound(){

currentFood=foods[Math.floor(Math.random()*foods.length)]

foodEl.innerText=currentFood.emoji

choicesEl.innerHTML=""

let types=["green","yellow","red"]

types.sort(()=>0.5-Math.random())

types=types.slice(0,2)

types.forEach(type=>{

let btn=document.createElement("div")

btn.className="choice "+type

btn.dataset.type=type

if(type=="green")btn.innerText="🟢 กินได้บ่อย"
if(type=="yellow")btn.innerText="🟡 กินพอดี"
if(type=="red")btn.innerText="🔴 กินแต่น้อย"

choicesEl.appendChild(btn)

})

}

function answer(type){

if(lock)return

lock=true

if(type==currentFood.type){

score++
scoreEl.innerText=score

}

setTimeout(()=>{

lock=false
newRound()

},500)

}

function checkTouch(x,y){

document.querySelectorAll(".choice").forEach(btn=>{

let r=btn.getBoundingClientRect()

if(
x>r.left &&
x<r.right &&
y>r.top &&
y<r.bottom
){
answer(btn.dataset.type)
}

})

}

const video=document.getElementById("video")

const hands=new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks){

let hand=results.multiHandLandmarks[0]

let palm=hand[9]

let x=(1-palm.x)*window.innerWidth
let y=palm.y*window.innerHeight

checkTouch(x,y)

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:1280,
height:720
})

camera.start()

setInterval(()=>{

time--

timeEl.innerText=time

if(time<=0){

alert("Game Over! Score: "+score)

location.reload()

}

},1000)

newRound()

</script>

</body>
</html>
