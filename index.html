<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>เกมอาหาร 3 สี</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:black;
color:white;
overflow:hidden;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
z-index:-1;
}

#mode{
position:absolute;
top:20px;
left:20px;
z-index:2;
}

#food{
font-size:80px;
margin-top:120px;
}

.buttons{
position:absolute;
bottom:60px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

button{
font-size:40px;
padding:30px 60px;
border:none;
border-radius:20px;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f;color:black}
.red{background:#e74c3c}

#score{
position:absolute;
top:20px;
right:20px;
font-size:30px;
}

</style>
</head>

<body>

<select id="mode">
<option value="click">โหมดคลิก</option>
<option value="camera">โหมดกล้อง</option>
</select>

<video id="camera" autoplay playsinline></video>

<div id="score">คะแนน: 0</div>

<div id="food"></div>

<div class="buttons">

<button class="green" onclick="choose('green')">เขียว</button>
<button class="yellow" onclick="choose('yellow')">เหลือง</button>
<button class="red" onclick="choose('red')">แดง</button>

</div>

<script>

const foods=[

{name:"แอปเปิล 🍎",color:"green"},
{name:"กล้วย 🍌",color:"green"},
{name:"แตงโม 🍉",color:"green"},
{name:"บรอกโคลี 🥦",color:"green"},
{name:"แครอท 🥕",color:"green"},
{name:"แตงกวา 🥒",color:"green"},

{name:"ข้าว 🍚",color:"yellow"},
{name:"ไข่ 🍳",color:"yellow"},
{name:"นม 🥛",color:"yellow"},
{name:"ข้าวโพด 🌽",color:"yellow"},
{name:"มันฝรั่ง 🥔",color:"yellow"},
{name:"ขนมปัง 🍞",color:"yellow"},

{name:"โดนัท 🍩",color:"red"},
{name:"เค้ก 🍰",color:"red"},
{name:"ลูกอม 🍬",color:"red"},
{name:"น้ำอัดลม 🥤",color:"red"},
{name:"เฟรนช์ฟราย 🍟",color:"red"},
{name:"เบอร์เกอร์ 🍔",color:"red"}

]

let current
let score=0

function nextFood(){

current=foods[Math.floor(Math.random()*foods.length)]

document.getElementById("food").innerText=current.name

}

function choose(color){

if(color===current.color){

score++
document.getElementById("score").innerText="คะแนน: "+score

}

nextFood()

}

nextFood()

// camera mode

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
camera.srcObject=stream
})

document.addEventListener("keydown",(e)=>{

if(mode.value==="camera"){

if(e.key==="ArrowLeft") choose("green")
if(e.key==="ArrowUp") choose("yellow")
if(e.key==="ArrowRight") choose("red")

}

})

</script>

</body>
</html>
