<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เกมอาหาร 3 สี</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f2f2f2;
}

h1{
font-size:40px;
}

#video{
position:absolute;
left:0;
top:0;
transform:scaleX(-1);
}

#cursor{
position:absolute;
width:40px;
height:40px;
background:red;
border-radius:50%;
pointer-events:none;
}

.container{
margin-top:420px;
}

.food{
font-size:36px;
margin:10px;
}

button{
font-size:30px;
padding:25px;
margin:15px;
border:none;
border-radius:12px;
width:260px;
}

.green{background:#4CAF50;color:white}
.yellow{background:#FFC107}
.red{background:#F44336;color:white}

#score{
font-size:30px;
margin-top:10px;
}

#timer{
font-size:28px;
}
</style>
</head>

<body>

<h1>🍎 เกมอาหาร 3 สี</h1>
<div id="timer">เวลา: 60</div>
<div id="score">คะแนน: 0</div>

<video id="video" width="640" height="480" autoplay></video>
<div id="cursor"></div>

<div class="container">
<div id="food" class="food"></div>

<button class="green" id="g">เขียว</button>
<button class="yellow" id="y">เหลือง</button>
<button class="red" id="r">แดง</button>
</div>

<script>

const foods=[
{name:"ผักบุ้ง",type:"green"},
{name:"แครอท",type:"green"},
{name:"บรอกโคลี",type:"green"},
{name:"แตงกวา",type:"green"},
{name:"ผักกาด",type:"green"},
{name:"กล้วย",type:"yellow"},
{name:"ข้าว",type:"yellow"},
{name:"มันฝรั่ง",type:"yellow"},
{name:"ขนมปัง",type:"yellow"},
{name:"ไข่",type:"yellow"},
{name:"เค้ก",type:"red"},
{name:"ไอศกรีม",type:"red"},
{name:"น้ำอัดลม",type:"red"},
{name:"ลูกอม",type:"red"},
{name:"โดนัท",type:"red"},
{name:"มะม่วง",type:"yellow"},
{name:"ส้ม",type:"yellow"},
{name:"ผักคะน้า",type:"green"},
{name:"ช็อกโกแลต",type:"red"},
{name:"เฟรนช์ฟราย",type:"red"}
];

let current;
let score=0;
let time=60;

function newFood(){
current=foods[Math.floor(Math.random()*foods.length)];
document.getElementById("food").innerText=current.name;
}

function answer(type){
if(type==current.type){
score++;
document.getElementById("score").innerText="คะแนน: "+score;
}
newFood();
}

document.getElementById("g").onclick=()=>answer("green");
document.getElementById("y").onclick=()=>answer("yellow");
document.getElementById("r").onclick=()=>answer("red");

newFood();

setInterval(()=>{
time--;
document.getElementById("timer").innerText="เวลา: "+time;
if(time<=0){
alert("หมดเวลา คะแนน "+score);
location.reload();
}
},1000);

const video=document.getElementById("video");
const cursor=document.getElementById("cursor");

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(results=>{
if(results.multiHandLandmarks.length>0){

let p=results.multiHandLandmarks[0][8];

let x=(1-p.x)*window.innerWidth;
let y=p.y*window.innerHeight;

cursor.style.left=x+"px";
cursor.style.top=y+"px";

checkHover(x,y);

}
});

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();

function checkHover(x,y){

let buttons=document.querySelectorAll("button");

buttons.forEach(btn=>{
let r=btn.getBoundingClientRect();

if(
x>r.left &&
x<r.right &&
y>r.top &&
y<r.bottom
){
btn.click();
}
});

}

</script>

</body>
</html>
